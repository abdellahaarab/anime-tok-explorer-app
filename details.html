<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نمي توك - الحلقات</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/footer.css">
  <style>
    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background: #0b0c10;
      color: #c5c6c7;
      transition: 0.3s;
    }

    body.light {
      background: #f4f6f9;
      color: #222;
    }

    nav h1 {
      margin: 0;
      color: #66fcf1;
    }

    nav a {
      color: #ccc;
      margin: 0 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
    }

    .mode-toggle {
      background: none;
      border: none;
      color: #66fcf1;
      font-size: 20px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 60vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
    }

    .hero-content {
      position: absolute;
      bottom: 30px;
      right: 30px;
      color: white;
      z-index: 2;
    }

    .hero-content h2 {
      margin: 0;
      font-size: 36px;
    }

    /* ANIME INFO */
    .anime-info {
      max-width: 1100px;
      margin: 40px auto;
      display: flex;
      gap: 25px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .anime-info img {
      width: 260px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .details {
      flex: 1;
    }

    .details h3 {
      color: #66fcf1;
      margin-top: 0;
    }

    .details p {
      line-height: 1.7;
    }

    .tag {
      display: inline-block;
      padding: 5px 10px;
      margin: 5px;
      background: #45a29e;
      border-radius: 20px;
      font-size: 12px;
      color: #0b0c10;
    }

    /* TRAILER */
    .trailer {
      text-align: center;
      margin: 40px 0;
    }

    iframe {
      width: 90%;
      max-width: 800px;
      height: 450px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    /* EPISODES */
    .episodes {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .episodes h2 {
      text-align: center;
      color: #66fcf1;
      margin-bottom: 20px;
    }

    .episode {
      background: #1f2833;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .episode:hover {
      transform: translateY(-4px);
      background: #253140;
    }

    .episode a {
      color: #66fcf1;
      text-decoration: none;
      font-weight: bold;
    }

    .episode p {
      margin: 5px 0;
      font-size: 14px;
    }

    .score {
      color: gold;
    }

    /* LIGHT MODE */
    body.light nav {
      background: #fff;
    }

    body.light .episode {
      background: #fff;
    }

    body.light .episode a {
      color: #00796b;
    }

    body.light .details h3 {
      color: #00796b;
    }
  </style>
  
</head>

<body>

<!-- NAV -->
<!-- navbar-placeholder -->
<div id="navbar-placeholder"></div>

<script>
fetch("component/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-placeholder").innerHTML = data;
  });
</script>
<!-- navbar-placeholder -->

<!-- HERO -->
<section class="hero">
  <img src="https://cdn.myanimelist.net/images/anime/4/19644.jpg">
  <div class="hero-content">
    <h2 id="hero-title">كاوبوي بيبوب</h2>
  </div>
</section>

<div class="anime-info" id="anime-info"></div>

<div class="trailer" id="trailer"></div>

<section class="episodes">
  <h2>قائمة الحلقات</h2>
  <div id="episodes-list"></div>
</section>
  
<!-- footer-placeholder -->
<div id="footer-placeholder"></div>

<script>
fetch("component/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-placeholder").innerHTML = data;
  });
</script>

<!-- footer-placeholder -->

<script>
const animeUrl = "https://api.jikan.moe/v4/anime/28/full";
const episodesUrl = "https://api.jikan.moe/v4/anime/28/episodes";

async function loadAnimeInfo() {
  const res = await fetch(animeUrl);
  const { data } = await res.json();

  document.getElementById("hero-title").textContent = data.title;

  document.getElementById("anime-info").innerHTML = `
    <img src="${data.images.jpg.image_url}">
    <div class="details">
      <h3>${data.title} (${data.year})</h3>
      <p>
        <span class="tag">${data.type}</span>
        <span class="tag">${data.status}</span>
        <span class="tag">${data.episodes} حلقة</span>
      </p>
      <p>⭐ ${data.score} | الترتيب #${data.rank}</p>
      <p>${data.synopsis}</p>
    </div>
  `;

  const trailerDiv = document.getElementById("trailer");
  trailerDiv.innerHTML = data.trailer?.embed_url
    ? `<iframe src="${data.trailer.embed_url}" allowfullscreen></iframe>`
    : `<p>لا يوجد عرض دعائي</p>`;
}

async function loadEpisodes() {
  const res = await fetch(episodesUrl);
  const { data } = await res.json();

  document.getElementById("episodes-list").innerHTML =
    data.map(ep => `
      <div class="episode">
        <a href="${ep.url}" target="_blank">
          الحلقة ${ep.mal_id}: ${ep.title}
        </a>
        <p>${ep.title_japanese || ""}</p>
        <p>${ep.aired ? new Date(ep.aired).toLocaleDateString('ar-EG') : ""}</p>
        <p class="score">⭐ ${ep.score || "-"}</p>
      </div>
    `).join("");
}


loadAnimeInfo();
loadEpisodes();
</script>

</body>
  <script src="scripts/navbar.js"></script>
</html>
