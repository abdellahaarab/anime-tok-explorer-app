<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎬 أنمي توك</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/footer.css">
  <link rel="stylesheet" href="styles/navbar.css">
  <style>
    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background: #f4f6f9;
      color: #333;
      transition: 0.4s;
    }

    body.dark {
      background: #12121c;
      color: #eee;
    }

    

    .mode-toggle {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
    }

    .hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      z-index: 2;
      max-width: 700px;
    }

    .hero-content h2 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero-content p {
      font-size: 18px;
      color: #ccc;
    }

    .hero-content button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero-content button:hover {
      transform: scale(1.05);
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 50px auto;
      padding: 20px;
    }

    /* GRID */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .anime-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .dark .anime-card {
      background: #1e1e2f;
    }

    .anime-card:hover {
      transform: translateY(-5px);
    }

    .anime-card img {
      width: 100%;
      height: 270px;
      object-fit: cover;
    }

    .anime-details {
      padding: 12px;
    }

    .anime-details h3 {
      font-size: 15px;
      margin: 5px 0;
    }

    .score {
      color: orange;
      font-weight: bold;
    }

    /* PAGINATION */
    .pagination {
      text-align: center;
      margin-top: 30px;
    }

    .pagination button {
      padding: 10px 15px;
      border: none;
      margin: 5px;
      border-radius: 6px;
      background: #1a237e;
      color: white;
      cursor: pointer;
    }

    .pagination button:hover {
      background: #303f9f;
    }
  </style>
</head>

<body>


<!-- navbar-placeholder -->
<div id="navbar-placeholder"></div>

<script>
fetch("component/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-placeholder").innerHTML = data;
  });
</script>
<!-- navbar-placeholder -->


<!-- HERO (الصورة داخل HTML) -->
<section class="hero">
  <img src="https://raw.githubusercontent.com/abdellahaarab/anime-tok-explorer-app/refs/heads/main/images/1262882.jpg" alt="Anime Background">

  <div class="hero-content">
    <h2>اكتشف عالم الأنمي</h2>
    <p>أفضل منصة لاستكشاف أحدث وأشهر الأنميات بسهولة</p>
    <button onclick="window.scrollTo({top:800, behavior:'smooth'})">
      استكشف الآن 🔥
    </button>
  </div>
</section>

<!-- MAIN -->
<main>
  <div id="anime-grid" class="anime-grid"></div>

  <div class="pagination">
    <button id="prev-page">➡</button>
    <span id="page-info">1</span>
    <button id="next-page">⬅</button>
  </div>
</main>
<!-- footer-placeholder -->
<div id="footer-placeholder"></div>

<script>
fetch("component/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-placeholder").innerHTML = data;
  });
</script>

<!-- footer-placeholder -->
</body>
  
<script>
const apiBase = "https://api.jikan.moe/v4/anime";
let currentPage = 1;

async function fetchAnime(page = 1) {
  try {
    const res = await fetch(`${apiBase}?page=${page}`);
    const json = await res.json();

    displayAnime(json.data);
    handlePagination(json.pagination);

  } catch (err) {
    console.error(err);
  }
}

function displayAnime(list) {
  document.getElementById("anime-grid").innerHTML =
    list.map(a => `
      <div class="anime-card">
        <a href="details.html?id=${a.mal_id}">
          <img src="${a.images.jpg.image_url}">
        </a>
        <div class="anime-details">
          <h3>${a.title}</h3>
          <p>${a.type || "غير معروف"}</p>
          <p class="score">⭐ ${a.score || "?"}</p>
        </div>
      </div>
    `).join("");
}

/* ⭐ الإصلاح الحقيقي هنا */
function handlePagination(pagination) {
  document.getElementById("page-info").textContent =
    `الصفحة ${pagination.current_page} من ${pagination.last_visible_page}`;

  document.getElementById("prev-page").disabled =
    pagination.current_page === 1;

  document.getElementById("next-page").disabled =
    !pagination.has_next_page;
}

/* أزرار */
document.getElementById("next-page").onclick = () => {
  currentPage++;
  fetchAnime(currentPage);
  window.scrollTo({ top: 700, behavior: 'smooth' });
};

document.getElementById("prev-page").onclick = () => {
  if (currentPage > 1) {
    currentPage--;
    fetchAnime(currentPage);
    window.scrollTo({ top: 700, behavior: 'smooth' });
  }
};

document.getElementById("anime-grid").innerHTML = "⏳ ...جاري التحميل";
/* تحميل أول مرة */
fetchAnime(currentPage);
</script>




</html>
